spring.application.name=Gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# --- USER & AUTH ---
# Como o User MS tem dois controllers (/users e /auth), criamos duas rotas
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service-users
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://user
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/users/**

# --- PRODUCT SERVICE ---
spring.cloud.gateway.server.webmvc.routes[2].id=product-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://Product
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/products/**

# --- ORDER SERVICE ---
spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://order
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/orders/**

# --- INVENTORY SERVICE ---
spring.cloud.gateway.server.webmvc.routes[4].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://inventory
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/inventory/**

# --- PAYMENTS SERVICE ---
spring.cloud.gateway.server.webmvc.routes[5].id=payment-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://Payments
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/payments/**
