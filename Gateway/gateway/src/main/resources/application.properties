spring.application.name=Gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# --- USER & AUTH ---
# Como o User MS tem dois controllers (/users e /auth), criamos duas rotas
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=CircuitBreaker=gatewayCB,forward:/fallback

spring.cloud.gateway.server.webmvc.routes[1].id=user-service-users
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://user
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=CircuitBreaker=gatewayCB,forward:/fallback

# --- PRODUCT SERVICE ---
spring.cloud.gateway.server.webmvc.routes[2].id=product-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://Product
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/products/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=CircuitBreaker=gatewayCB,forward:/fallback

# --- ORDER SERVICE ---
spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://order
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/orders/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=CircuitBreaker=gatewayCB,forward:/fallback

# --- INVENTORY SERVICE ---
spring.cloud.gateway.server.webmvc.routes[4].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://inventory
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/inventory/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=CircuitBreaker=gatewayCB,forward:/fallback

# --- PAYMENTS SERVICE ---
spring.cloud.gateway.server.webmvc.routes[5].id=payment-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://Payments
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/payments/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=CircuitBreaker=gatewayCB,forward:/fallback

# Resilience4j
# O Circuit Breaker vai analisar janelas de 10 em 10 chamadas
resilience4j.circuitbreaker.instances.gatewayCB.sliding-window-size=10
# Se 50% ou mais falharem, ele OPEN (Desarma)
resilience4j.circuitbreaker.instances.gatewayCB.failure-rate-threshold=50
# Tempo que ele fica bloqueado (OPEN) antes de testar de novo (ir para HALF-OPEN)
resilience4j.circuitbreaker.instances.gatewayCB.wait-duration-in-open-state=5s
# No HALF-OPEN, ele permite apenas 3 chamadas de teste
resilience4j.circuitbreaker.instances.gatewayCB.permitted-number-of-calls-in-half-open-state=3