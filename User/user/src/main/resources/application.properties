spring.application.name=user

# Chave secreta usada pelo JwtUtil para assinar e validar os tokens JWT
# IMPORTANTE: Em produção, o ideal é usar variáveis de ambiente em vez de código fixo
secret.key=minhachavesupersecretaecommerce2026!@#

# Configuração do PostgreSQL
spring.datasource.url=jdbc:postgresql://user-postgres:5432/user
spring.datasource.username=postgres
spring.datasource.password=root

# Mostra o SQL formatado no console (ajuda muito no desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Atualiza o banco de dados automaticamente
#spring.jpa.hibernate.ddl-auto=update

# Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Configuração do RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
logging.level.org.springframework.security=DEBUG

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/