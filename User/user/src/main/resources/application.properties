spring.application.name=user

# Chave secreta usada pelo JwtUtil para assinar e validar os tokens JWT
# IMPORTANTE: Em produção, o ideal é usar variáveis de ambiente em vez de código fixo
secret.key=minhachavesupersecretaecommerce2026!@#
# Configuração do PostgreSQL
spring.datasource.url=jdbc:postgresql://user-postgres:5432/user_db
spring.datasource.username=postgres
spring.datasource.password=root

# Mostra o SQL formatado no console (ajuda muito no desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Atualiza o banco de dados automaticamente
spring.jpa.hibernate.ddl-auto=update

# Configuração do RabbitMQ
spring.rabbitmq.host=user-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
logging.level.org.springframework.security=DEBUG
