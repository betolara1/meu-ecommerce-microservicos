# Test configuration using H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate configuration for H2
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable RabbitMQ for context loads test if possible, or use local/mock
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# JWT Secret for tests
secret.key=test_secret_key_for_unit_tests_only_1234567890
