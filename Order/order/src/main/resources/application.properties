spring.application.name=order

# Chave secreta usada pelo JwtUtil para assinar e validar os tokens JWT
# IMPORTANTE: Em produção, o ideal é usar variáveis de ambiente em vez de código fixo
secret.key=minhachavesupersecretaecommerce2026!@#

# Configuração do PostgreSQL
spring.datasource.url=jdbc:postgresql://order-postgres:5432/order_db
spring.datasource.username=postgres
spring.datasource.password=root

# Mostra o SQL formatado no console (ajuda muito no desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Atualiza o banco de dados automaticamente
#spring.jpa.hibernate.ddl-auto=update

# Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Configuração do RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
logging.level.org.springframework.security=DEBUG

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Resilience4j
# O Circuit Breaker vai analisar janelas de 10 em 10 chamadas
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
# Se 50% ou mais falharem, ele OPEN (Desarma)
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
# Tempo que ele fica bloqueado (OPEN) antes de testar de novo (ir para HALF-OPEN)
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=5s
# No HALF-OPEN, ele permite apenas 3 chamadas de teste
resilience4j.circuitbreaker.instances.inventoryService.permitted-number-of-calls-in-half-open-state=3